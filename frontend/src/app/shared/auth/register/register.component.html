<mat-card>
  
  <mat-card-content>
    <form [formGroup]="this.form" (submit)="this.submit()">
      <br />
      <mat-form-field appearance="outline">
        <mat-label>Prénom</mat-label>
        <input matInput formControlName="firstname" type="text" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>
      <br />

      <mat-form-field appearance="outline">
        <mat-label>Nom</mat-label>
        <input matInput formControlName="lastname" type="text" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>
      <br />

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>
      <br />

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput formControlName="password" type="password" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>
      <br />

      <mat-form-field appearance="outline">
        <mat-label>Confirmation du mot de passe</mat-label>
        <input matInput formControlName="confirmPassword" type="password" />
        @if (form.hasError('passwordMismatch')){
            <mat-error align="end">Les mots de passe ne correspondent pas</mat-error>
        }
      </mat-form-field>
      <br />

      <button mat-raised-button color="primary" type="submit" [disabled]="this.form.invalid">
        @if (isLoading()) { Inscription... } @else { Inscription }
      </button>
    </form>
  </mat-card-content>
  
</mat-card>
