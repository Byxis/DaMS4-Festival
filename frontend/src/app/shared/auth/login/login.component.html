<mat-card>
  <mat-card-header>
    <mat-card-title><h2>Connexion</h2></mat-card-title>
    <mat-card-subtitle>Entrez vos informations de connexion</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="this.form" (submit)="this.submit()">
      <br />
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>
      <br />

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput formControlName="password" type="password" />
        <mat-error align="end">Obligatoire</mat-error>
      </mat-form-field>

      @if (this.error()) {
        <div class="with-icon">
          <mat-icon color="warn">error_outline</mat-icon>
          <span  class="aligned-with-icon" >{{ this.error() }}</span>
        </div>
      }
      
      <button mat-raised-button color="primary" type="submit" [disabled]="this.form.invalid">
        @if (isLoading()) { Connexion... } @else { Connexion }
      </button>
      <a routerLink="/register">Pas encore inscrit?</a>
    </form>
  </mat-card-content>
</mat-card>
