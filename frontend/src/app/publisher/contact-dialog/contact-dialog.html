<h2 mat-dialog-title>{{ data ? 'Modifier' : 'Ajouter' }} un contact</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field class="form-field">
      <mat-label>Prénom</mat-label>
      <input matInput formControlName="name" />
      <mat-error>Prénom requis</mat-error>
    </mat-form-field>
    <mat-form-field class="form-field">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="familyName" />
      <mat-error>Nom requis</mat-error>
    </mat-form-field>
    <mat-form-field class="form-field">
      <mat-label>Rôle</mat-label>
      <input matInput formControlName="role" />
    </mat-form-field>
    <mat-form-field class="form-field">
      <mat-label>Téléphone</mat-label>
      <input matInput formControlName="telephone" />
      <mat-error>Téléphone invalide</mat-error>
    </mat-form-field>
    <mat-form-field class="form-field">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" />
      <mat-error>Email invalide</mat-error>
    </mat-form-field>
    @if (form.hasError('phoneOrEmailRequired')) {
    <mat-error>Téléphone ou email requis</mat-error>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Annuler</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">
    Enregistrer
  </button>
</mat-dialog-actions>
