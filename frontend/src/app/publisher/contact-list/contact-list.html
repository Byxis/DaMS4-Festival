<mat-card class="info-block contact-block">
  <mat-card-title>Liste des contacts</mat-card-title>

  <div class="contact-content">
    <div class="contact-row contact-header">
      <span>Prénom Nom</span>
      <span>Rôle</span>
      <span>Téléphone</span>
      <span>email</span>
      <button mat-icon-button (click)="this.onAdd()" class="highlighted">
        <mat-icon>add_circle_outline</mat-icon>
      </button>
    </div>

    @for (contact of this.contacts(); track contact.email) {
    <div class="contact-row">
      <span class="contact-name">{{ contact.name }} {{ contact.familyName }}</span>
      <span class="contact-role">{{ contact.role }}</span>
      <span class="contact-phone">{{ contact.telephone }}</span>
      <span class="contact-email">{{ contact.email }}</span>
      <div>
        <button mat-icon-button (click)="this.onEdit(contact)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button (click)="this.onDelete(contact)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
    }
  </div>
</mat-card>
