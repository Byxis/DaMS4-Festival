<div class="reservation-container">
  @if (isLoading()) {
  <div class="skeleton-container">
    <div class="skeleton-header">
      <div class="skeleton skeleton-icon"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-items">
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
      </div>
      <div class="skeleton skeleton-status"></div>
    </div>
  </div>
  } @else if (isError()) {
  <div class="error-container">
    <mat-icon class="error-icon">error_outline</mat-icon>
    <div class="error-message">Erreur lors du chargement de la réservation</div>
  </div>
  } @else {
  <div class="reservation-header" (click)="toggleExpand()">
    <mat-icon class="expand-icon" [class.expanded]="isExpanded()">
      {{ isExpanded() ? 'expand_less' : 'expand_more' }}
    </mat-icon>

    <button class="logo-name-button" (click)="navigateToPublisher()" [disabled]="!publisher()">
      @if (this.publisher()?.logoUrl) {
      <img
        [src]="this.publisher()?.logoUrl"
        alt="{{ this.publisher()?.name }} logo"
        class="logo-img"
      />
      } @else {
      <mat-icon class="logo-fallback-icon">business</mat-icon>
      }
      <span class="publisher-name">{{ this.publisher()?.name }}</span>
    </button>

    <div class="items-row">
      @for (item of items(); track $index) {
      <div class="item" (click)="$event.stopPropagation()" [class.locked]="item.locked">
        <mat-checkbox
          [checked]="item.checked"
          [disabled]="item.locked"
          (change)="toggleItemCheck($index)"
        ></mat-checkbox>
        <span class="item-label" (click)="!item.locked && toggleItemCheck($index)">{{
          item.label
        }}</span>
      </div>
      }
    </div>

    <div class="status-container">
      <button
        mat-button
        [matMenuTriggerFor]="statusMenu"
        class="status-button"
        (click)="$event.stopPropagation()"
        [style.backgroundColor]="getStatusBackgroundColor(selectedStatus())"
        [style.color]="getStatusColor(selectedStatus())"
        [style.borderColor]="getStatusColor(selectedStatus())"
      >
        <span class="status-text">Status : {{ currentStatusLabel() }}</span>
        <mat-icon class="status-icon">expand_more</mat-icon>
      </button>
      <mat-menu #statusMenu="matMenu" panelClass="status-menu-panel">
        @for (status of statuses; track status) {
        <button
          mat-menu-item
          (click)="setStatus(status)"
          [style.color]="getStatusColor(status)"
          [style.backgroundColor]="getStatusBackgroundColor(status)"
          [style.fontWeight]="selectedStatus() === status ? '700' : '500'"
        >
          {{ getStatusLabel(status) }}
        </button>
        }
      </mat-menu>
    </div>
  </div>
  @if (isExpanded()) {
  <div class="reservation-details">
    <!-- Contenu détaillé à ajouter plus tard -->
  </div>
  } }
</div>
