<mat-toolbar class="header" color="transparent">
  <span class="logo">AYAE Festivals</span>

  <span class="spacer"></span>

  @if (authSvc.isLoggedIn()) {
    <nav class="nav">
        <a
        mat-button
        routerLink="/festivals"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >
        Festivals
        </a>

        <a
        mat-button
        routerLink="/editors"
        routerLinkActive="active"
        >
        Editeurs
        </a>

        @if (authSvc.isAdmin()) {
        <a
            mat-button
            routerLink="/admin"
            routerLinkActive="active"
        >
            Administration
        </a>
        }
    
    <button
        mat-icon-button
        [matMenuTriggerFor]="profilePanel"
        class="profile-btn"
        [matMenuTriggerRestoreFocus]="false">
        <mat-icon>account_circle</mat-icon>
    </button>
    </nav>
    }
</mat-toolbar>

    <!-- Profile panel -->
<mat-menu #profilePanel="matMenu" class="profile-menu">
  @if (authSvc.currentUser(); as user) {
    <div class="profile-card">
      <div class="avatar-wrapper">
        <mat-icon class="avatar">account_circle</mat-icon>
      </div>

      <div class="name">
        prénom NOM
      </div>

      <div class="email">
        email
      </div>

      <div class="role">
        Vous êtes {{ user.role }}
      </div>

      <button class="logout-btn" (click)="logout()">
        Déconnexion
      </button>
    </div>
  }
</mat-menu>
