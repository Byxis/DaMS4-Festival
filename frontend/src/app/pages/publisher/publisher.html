<div class="editor-page-wrapper">
  <header class="page-header">
    <div class="logo-name-group">
      <img src="{{ this.publisher.logoUrl }}" alt="Logo" class="logo-img" />
      <h1>{{ this.publisher.name }}</h1>
    </div>
    <button mat-flat-button (click)="this.deletePublisher()" color="warn" class="delete-btn">
      Supprimer <mat-icon>delete</mat-icon>
    </button>
  </header>

  <contact-list
    [contacts]="this.contacts"
    (addContact)="this.openAddDialog()"
    (editContact)="this.openEditDialog($event)"
  >
  </contact-list>

  <!-- TODO: List of games related to this publisher -->

  <!-- TODO: List of festivals related to this publisher -->
</div>
