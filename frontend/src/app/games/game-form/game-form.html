<form [formGroup]="form" (ngSubmit)="submit()">

<mat-form-field appearance="outline">
  <mat-label>Name</mat-label>
  <input matInput type="text" formControlName="name" placeholder="game's name" />
</mat-form-field>

<mat-form-field appearance="outline">
  <mat-label>Editor</mat-label>
  <input matInput type="text" formControlName="editor" placeholder="game's editor" />
</mat-form-field>

<mat-form-field>
  <mat-label>Type de jeu</mat-label>
  <mat-select formControlName="type">
    <mat-option value="Tout Public">Tout Public</mat-option>
    <mat-option value="Ambiance">Ambiance</mat-option>
    <mat-option value="Experts">Experts</mat-option>
    <mat-option value="Enfants">Enfants</mat-option>
    <mat-option value="Classiques">Classiques</mat-option>
    <mat-option value="Initiés">Initiés</mat-option>
    <mat-option value="Jeu de rôle">Jeu de rôle</mat-option>
  </mat-select>
</mat-form-field>


<mat-form-field appearance="outline">
  <mat-label>Number minimum of player</mat-label>
  <input matInput type="number" formControlName="number_minimal_of_player" placeholder="number minimum of player" />
</mat-form-field>

<mat-form-field appearance="outline">
  <mat-label>Number maximum of player</mat-label>
  <input matInput type="number" formControlName="number_maximal_of_player" placeholder="number maximum of player" />
</mat-form-field>

 <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
    Submit
  </button>

  <button mat-button type="button" (click)="resetGameForm()">Reset</button>
  <button matFab  type="button" (click)="close()">
        <mat-icon>close</mat-icon>
    </button>
</form>
