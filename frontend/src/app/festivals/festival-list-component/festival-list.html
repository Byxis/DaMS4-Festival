<div class="header">
    <h1>Festivals : </h1>
    <button matFab aria-label="Add a festival button" (click)="toggleForm()">
        <mat-icon>add</mat-icon>
    </button>

</div>
    @if (showForm) {
    <app-festival-new-form-component (festivalCreated)="onFestivalCreated()">
    </app-festival-new-form-component>

    }

<div class="festivals-container">
    @for(festival of this.svc._festivals(); track festival.id; let i =$index){
    <app-festival-card [festival]="festival" (remove)="removeFestival($event)">
    </app-festival-card>
    }
</div>
