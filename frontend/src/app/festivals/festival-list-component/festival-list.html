
<div class="counter-festival">    
    @if(svc.festivals().length ==0){
        <p> Il n'y a aucun festival.</p>
    }@else{
        <p> Il y a {{svc.festivals().length}} festivals dans notre liste.</p>
    }
</div>
<div class = "festivals-container">
    @for(festival of this.svc.festivals(); track festival.id; let i =$index){ 
        <app-festival-card [festival] = "festival"
            (remove)="remove($event)">    
        </app-festival-card>
    }
</div>
