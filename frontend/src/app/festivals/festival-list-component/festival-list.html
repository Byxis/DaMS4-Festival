<div class="main-container">
    <div class="header">
        <h1>Festivals : </h1>
        <button matFab aria-label="Add a festival button" (click)="openFormDialog()">
            <mat-icon>add</mat-icon>
        </button>
    </div>



    <div class="festivals-container">
        @for(festival of this.svc._festivals(); track festival.id; let i =$index){
        <app-festival-card [festival]="festival" (remove)="removeFestival($event)">
        </app-festival-card>
        }
    </div>
</div>
