<mat-card>
  <mat-card-header>
    <mat-card-title>{{ getTitle() }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Nom du festival</mat-label>
        <input matInput formControlName="name" placeholder="ex: Festival des Arts 2025">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Lieu</mat-label>
        <input matInput formControlName="location" placeholder="ex: Paris, France">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Date de début</mat-label>
        <input matInput formControlName="start_date" type="date">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Date de fin</mat-label>
        <input matInput formControlName="end_date" type="date">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Nombre de tables</mat-label>
        <input matInput formControlName="table_count" type="number" placeholder="ex: 150">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Nombre de grandes tables</mat-label>
        <input matInput formControlName="big_table_count" type="number" placeholder="ex: 40">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Nombre de tables municipales</mat-label>
        <input matInput formControlName="town_table_count" type="number" placeholder="ex: 20">
      </mat-form-field>

    </form>
  </mat-card-content>

  <mat-card-actions>
    <button mat-stroked-button (click)="cancel()">Annuler</button>
    <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="submit()">
      {{ getSubmitButtonText() }}
    </button>
  </mat-card-actions>
</mat-card>
