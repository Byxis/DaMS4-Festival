<mat-card>
    <mat-card-header>
        <mat-card-title>Nouvelle Zone Tarifaire</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <form [formGroup]="this.form" (submit)="this.submit()">

            <mat-form-field appearance="outline" class="form-field">
                <mat-label>Nom de la zone</mat-label>
                <input matInput formControlName="name" placeholder="ex: Zone Centrale">
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
                <mat-label>Prix par table (€)</mat-label>
                <input matInput formControlName="price" type="number" placeholder="ex: 150">
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
                <mat-label>Prises électriques</mat-label>
                <input matInput formControlName="electricalOutlet" type="number" placeholder="ex: 45">
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
                <mat-label>Prix par prise électrique (€)</mat-label>
                <input matInput formControlName="electricalOutletPrice" type="number" placeholder="ex: 20">
            </mat-form-field>

        </form>
    </mat-card-content>

    <mat-card-actions>
        <button mat-stroked-button (click)="this.cancel()">Annuler</button>
        <button mat-raised-button color="primary" [disabled]="this.form.invalid" (click)="this.submit()">
            Créer la zone
        </button>
    </mat-card-actions>
</mat-card>
